<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 야구부 분석: S-곡선과 변수 관계</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 680px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #0d47a1; font-size: 1.5rem; margin-bottom: 25px; }
        
        /* 변수 설명 카드 */
        .variable-info { display: flex; justify-content: space-between; margin-bottom: 25px; gap: 15px; }
        .var-card { flex: 1; padding: 15px; border-radius: 12px; font-size: 0.9rem; border: 1px solid #dee2e6; }
        .independent { border-top: 5px solid #2196f3; background: #e3f2fd; }
        .dependent { border-top: 5px solid #ff9800; background: #fff3e0; }
        .var-title { font-weight: bold; display: block; margin-bottom: 5px; color: #333; }

        /* 조작 패널 */
        .control-panel { background: #f1f3f5; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 30px; }
        .slider { width: 100%; height: 10px; border-radius: 5px; margin: 15px 0; cursor: pointer; }
        .val-display { font-size: 2.5rem; font-weight: 800; color: #1565c0; }

        /* 그래프 영역 (축 숫자 포함) */
        .visualization { padding: 20px 40px 50px 60px; border-radius: 15px; background: #fff; border: 1px solid #eee; position: relative; }
        .graph-wrapper { height: 200px; position: relative; border-bottom: 2px solid #333; border-left: 2px solid #333; }
        
        /* 축 숫자 라벨 스타일 */
        .y-axis-labels { position: absolute; left: -45px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; font-size: 0.8rem; color: #666; text-align: right; width: 40px; }
        .x-axis-labels { position: absolute; bottom: -30px; width: 100%; display: flex; justify-content: space-between; font-size: 0.8rem; color: #666; }
        .axis-title-y { position: absolute; left: -55px; top: -25px; font-size: 0.75rem; color: #333; font-weight: bold; }
        .axis-title-x { position: absolute; right: -40px; bottom: -25px; font-size: 0.75rem; color: #333; font-weight: bold; }

        /* 곡선 및 포인트 */
        .sigmoid-svg { width: 100%; height: 100%; overflow: visible; }
        .current-point { position: absolute; width: 14px; height: 14px; background: #ff1744; border-radius: 50%; transform: translate(-50%, 50%); transition: all 0.15s ease; z-index: 10; border: 2px solid white; }
        .threshold-line { position: absolute; width: 100%; border-top: 1px dashed #ff9800; bottom: 50%; pointer-events: none; }

        /* 최종 판정 결과 */
        .decision-box { text-align: center; padding: 20px; border-radius: 15px; font-size: 1.6rem; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .pass { background: #1a237e; color: white; }
        .fail { background: #ffffff; color: #333; border: 2px solid #dee2e6; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚾ 3할 타자 분류 AI 모델 분석</h1>

    <div class="variable-info">
        <div class="var-card independent">
            <span class="var-title">🟦 독립변수 (x축)</span>
            <strong>타율 (Batting Average)</strong><br>
            원인이 되는 입력 값 (.000 ~ .600)
        </div>
        <div class="var-card dependent">
            <span class="var-title">🟧 종속변수 (y축)</span>
            <strong>합격 확률 (Probability)</strong><br>
            타율에 의해 결정되는 결과 (0 ~ 1)
        </div>
    </div>

    <div class="control-panel">
        <label>타율 조절 (독립변수 x 입력)</label>
        <div class="val-display">.<span id="avgText">300</span></div>
        <input type="range" id="avgSlider" class="slider" min="0" max="600" value="300">
    </div>

    <div class="visualization">
        <span class="axis-title-y">확률(y)</span>
        <div class="y-axis-labels">
            <span>1.0</span><span>0.75</span><span>0.5</span><span>0.25</span><span>0.0</span>
        </div>
        
        <div class="graph-wrapper">
            <div class="threshold-line"></div>
            <svg class="sigmoid-svg" viewBox="0 0 600 200" preserveAspectRatio="none">
                <path id="curvePath" d="M0,200 C250,200 280,200 300,100 C320,0 350,0 600,0" stroke="#007bff" stroke-width="3" fill="none" opacity="0.3" />
            </svg>
            <div id="point" class="current-point" style="left: 50%; bottom: 50%;"></div>
        </div>

        <div class="x-axis-labels">
            <span>.000</span><span>.150</span><span>.300</span><span>.450</span><span>.600</span>
        </div>
        <span class="axis-title-x">타율(x)</span>
    </div>

    <div id="decisionBox" class="decision-box pass">
        분석 확률: <span id="probText">50.0</span>% → <span id="resText">3할 타자 (1)</span>
    </div>
</div>

<script>
    const slider = document.getElementById('avgSlider');
    const avgText = document.getElementById('avgText');
    const probText = document.getElementById('probText');
    const resText = document.getElementById('resText');
    const point = document.getElementById('point');
    const decisionBox = document.getElementById('decisionBox');

    slider.addEventListener('input', function() {
        const rawValue = parseInt(this.value);
        avgText.innerText = rawValue.toString().padStart(3, '0');

        // 로지스틱 회귀 수식 적용
        const x = rawValue / 1000;
        const w = 45; // S-곡선의 기울기
        const b = -w * 0.300; // 0.300을 결정 경계(
